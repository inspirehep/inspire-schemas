name: Test Python 2

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - python: python2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint - Pre-commit check
        uses: pre-commit/action@v3.0.1

      - name: Install Python2 interpreter
        run: |
          sudo apt-get update
          sudo apt-get install -y python2

      - name: Install python dependencies
        run: |
          wget https://bootstrap.pypa.io/pip/2.7/get-pip.py
          ${{ matrix.python }} get-pip.py
          ${{ matrix.python }} -m pip install --user --upgrade pip
          ${{ matrix.python }} -m pip --no-cache-dir install --user -e .[tests,docs]

      - name: Show python dependencies
        run: |
          pip --version
          ${{ matrix.python }} --version
          pip freeze

      - name: Build Test
        run: |
          ./tests/integration/test_setup.sh ${{ matrix.python }}

      - name: Run tests
        run: |
          ./run-tests.sh
